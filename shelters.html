<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelter Intelligence | TsunamiShield AI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet Mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map {
            height: 500px;
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            z-index: 1;
        }

        .shelter-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        @media (max-width: 1024px) {
            .shelter-grid {
                grid-template-columns: 1fr;
            }
        }

        .shelter-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .shelter-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 15px;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shelter-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .shelter-card.recommended {
            border: 2px solid var(--safe-green);
            position: relative;
        }

        .shelter-card.recommended::before {
            content: "Recommended";
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--safe-green);
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pill.available { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-pill.filling { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-pill.full { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .search-container {
            margin-bottom: 25px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 12px 45px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="dark-theme">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo-section">
            <i data-lucide="waves" color="#3b82f6" size="32"></i>
            <h1>Tsunami<span>Shield</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
            <a href="alerts.html" class="nav-item"><i data-lucide="bell"></i> <span>Alerts</span></a>
            <a href="risk-map.html" class="nav-item"><i data-lucide="map"></i> <span>Risk Map</span></a>
            <a href="evacuation.html" class="nav-item"><i data-lucide="move-up-right"></i> <span>Evacuation</span></a>
            <a href="shelters.html" class="nav-item active"><i data-lucide="home"></i> <span>Shelters</span></a>
            <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-big"></i> <span>Analytics</span></a>
            <a href="community.html" class="nav-item"><i data-lucide="users"></i> <span>Community</span></a>
            <a href="preparedness.html" class="nav-item"><i data-lucide="shield-check"></i> <span>Preparedness</span></a>
            <a href="admin.html" class="nav-item"><i data-lucide="lock"></i> <span>Admin Panel</span></a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <button class="menu-toggle" id="mobile-menu-btn"><i data-lucide="menu"></i></button>
            <div class="search-box" style="display: none;"> <!-- Hidden default search -->
                <i data-lucide="search" size="18" color="#94a3b8"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="system-meta" style="margin-left: auto;">
                <div class="current-time" id="clock">00:00:00 AM</div>
                <button class="btn btn-primary"><i data-lucide="phone"></i> <span>SOS Hotline</span></button>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="hero-section">
                <h2>Shelter Intelligence System</h2>
                <p>Real-time occupancy tracking and optimized evacuation routing.</p>
            </div>

            <div class="search-container">
                <i data-lucide="search"></i>
                <input type="text" id="shelter-search" placeholder="Locate nearest shelter by name or sector...">
            </div>

            <div class="shelter-grid">
                <div class="map-container">
                    <div id="map"></div>
                </div>

                <div class="shelter-list" id="shelter-list">
                    <!-- Shelter cards will be injected here -->
                </div>
            </div>

            <div class="stats-grid" style="margin-top: 30px;">
                <div class="stat-card">
                    <span class="stat-label">Total Capacity</span>
                    <span class="stat-value" id="total-capacity">4,500</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Occupied</span>
                    <span class="stat-value" id="total-occupied" style="color:var(--accent-blue);">1,240</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">System Status</span>
                    <span class="stat-value" style="color:var(--safe-green);">OPTIMAL</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Shelter Logic -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initShelterMap();
            startLiveUpdates();
            
            // Search functionality
            document.getElementById('shelter-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                filterShelters(term);
            });
        });

        let map;
        let shelterMarkers = [];
        let shelters = [
            { id: 1, name: "City Hall Shelter", lat: 13.0827, lng: 80.2707, capacity: 500, occupied: 120 },
            { id: 2, name: "Marina High School", lat: 13.055, lng: 80.280, capacity: 300, occupied: 290 },
            { id: 3, name: "Besant Nagar Center", lat: 12.990, lng: 80.260, capacity: 400, occupied: 150 },
            { id: 4, name: "Mylapore Relief Hub", lat: 13.033, lng: 80.250, capacity: 600, occupied: 450 },
            { id: 5, name: "North Chennai Depot", lat: 13.120, lng: 80.290, capacity: 800, occupied: 780 }
        ];

        function initShelterMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([13.0827, 80.2707], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            addShelterMarkers();
            renderShelterList();
        }

        function getStatus(occupied, capacity) {
            const pct = (occupied / capacity) * 100;
            if (pct > 80) return { label: "Full", class: "full", icon: "🔴" };
            if (pct > 50) return { label: "Filling Fast", class: "filling", icon: "🟡" };
            return { label: "Available", class: "available", icon: "🟢" };
        }

        function addShelterMarkers() {
            // Clear existing markers
            shelterMarkers.forEach(m => map.removeLayer(m));
            shelterMarkers = [];

            shelters.forEach(s => {
                const status = getStatus(s.occupied, s.capacity);
                const color = status.class === "full" ? "#ef4444" : (status.class === "filling" ? "#f59e0b" : "#22c55e");
                
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color:${color}; width:15px; height:15px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px ${color}"></div>`,
                    iconSize: [15, 15],
                    iconAnchor: [7.5, 7.5]
                });

                const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
                m.bindPopup(`
                    <div style="color:#000; padding:5px;">
                        <h4 style="margin-bottom:5px;">${s.name}</h4>
                        <p style="font-size:0.8rem;">Capacity: ${s.capacity}</p>
                        <p style="font-size:0.8rem;">Occupied: ${s.occupied}</p>
                        <p style="font-size:0.8rem; font-weight:700; color:${color}">Status: ${status.label}</p>
                    </div>
                `);
                
                s.marker = m;
                shelterMarkers.push(m);
            });
        }

        function renderShelterList(filteredShelters = shelters) {
            const list = document.getElementById('shelter-list');
            list.innerHTML = '';

            // Find best shelter (least occupied % and available)
            const best = [...shelters]
                .filter(s => (s.occupied / s.capacity) < 0.8)
                .sort((a, b) => (a.occupied / a.capacity) - (b.occupied / b.capacity))[0];

            filteredShelters.forEach(s => {
                const status = getStatus(s.occupied, s.capacity);
                const pct = Math.round((s.occupied / s.capacity) * 100);
                const isBest = best && s.id === best.id;

                const card = document.createElement('div');
                card.className = `shelter-card ${isBest ? 'recommended' : ''}`;
                card.onclick = () => highlightShelter(s);
                
                card.innerHTML = `
                    <div>
                        <h4 style="margin-bottom:5px;">🏠 ${s.name}</h4>
                        <p style="font-size:0.75rem; color:var(--text-secondary);">Capacity: ${s.capacity}</p>
                        <div style="width:100px; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:8px; overflow:hidden;">
                            <div style="width:${pct}%; height:100%; background:var(--accent-blue);"></div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <span class="status-pill ${status.class}">${status.label}</span>
                        <p style="font-size:0.7rem; color:var(--text-secondary); margin-top:5px;">${pct}% Full</p>
                    </div>
                `;
                list.appendChild(card);
            });

            // Update stats
            const totalCap = shelters.reduce((acc, s) => acc + s.capacity, 0);
            const totalOcc = shelters.reduce((acc, s) => acc + s.occupied, 0);
            document.getElementById('total-capacity').innerText = totalCap.toLocaleString();
            document.getElementById('total-occupied').innerText = totalOcc.toLocaleString();
        }

        function highlightShelter(s) {
            map.setView([s.lat, s.lng], 14);
            s.marker.openPopup();
        }

        function filterShelters(term) {
            const filtered = shelters.filter(s => s.name.toLowerCase().includes(term));
            renderShelterList(filtered);
        }

        function startLiveUpdates() {
            setInterval(() => {
                shelters.forEach(s => {
                    // Randomly update occupancy by +/- 5
                    const nudge = Math.floor(Math.random() * 11) - 5;
                    s.occupied = Math.max(0, Math.min(s.capacity, s.occupied + nudge));
                });
                addShelterMarkers();
                renderShelterList();
            }, 10000);
        }
    </script>
</body>
</html>
